<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kayıt Ol</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<header>
    <div class="logo">EBA</div>
</header>

<div class="container">
    <div class="login-box">
        <div class="role-tab">Kayıt</div>
        <h2>Hesap Oluştur</h2>

        <form id="registerForm">
            <div class="input-group">
                <label>Ad Soyad</label>
                <input type="text" id="name" placeholder="Ad Soyad">
            </div>

            <div class="input-group">
                <label>TC Kimlik No</label>
                <input type="text" id="tc" placeholder="11 haneli TC">
            </div>

            <div class="input-group">
                <label>Şifre</label>
                <input type="password" id="password" placeholder="Şifre">
            </div>

            <div class="input-group">
                <label>Rol</label>
                <select id="role">
                    <option value="ogrenci">Öğrenci</option>
                    <option value="ogretmen">Öğretmen</option>
                    <option value="veli">Veli</option>
                </select>
            </div>

            <button class="login-btn" type="submit">Kayıt Ol</button>
        </form>
    </div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let tc = document.getElementById("tc").value;
    let password = document.getElementById("password").value;
    let role = document.getElementById("role").value;

    if(!name || !tc || !password){
        alert("Tüm alanları doldurun!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Aynı TC kontrolü
    if(users.some(user => user.tc === tc)){
        alert("Bu TC zaten kayıtlı!");
        return;
    }

    users.push({
        name:name,
        tc:tc,
        password:password,
        role:role
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Kayıt başarılı");

    // ROLE GÖRE YÖNLENDİRME
    if(role === "ogrenci"){
        window.location.href = "öğrenci-login.html";
    }
    else if(role === "ogretmen"){
        window.location.href = "öğretmen-login.html";
    }
    else if(role === "veli"){
        window.location.href = "veli-login.html";
    }

});
</script>

</body>
</html>
