<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kayıt Ol</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<header>
    <div class="logo">EBA</div>
</header>

<div class="container">
    <div class="login-box">
        <div class="role-tab">Kayıt</div>
        <h2>Hesap Oluştur</h2>

        <form id="registerForm">
            <div class="input-group">
                <label>Ad Soyad</label>
                <input type="text" id="name" placeholder="Ad Soyad" required>
            </div>

            <div class="input-group">
                <label>TC Kimlik No</label>
                <input type="text" id="tc" placeholder="11 haneli TC" required>
            </div>

            <div class="input-group">
                <label>Şifre</label>
                <input type="password" id="password" placeholder="Şifre" required>
            </div>

            <div class="input-group" id="phoneGroup">
                <label>Telefon Numarası</label>
                <input type="tel" id="phone" placeholder="05xx xxx xx xx" required>
            </div>

            <div class="input-group">
                <label>Okul</label>
                <input type="text" id="school" placeholder="Örn: X Lisesi" required>
            </div>

            <div class="input-group">
                <label>Rol</label>
                <select id="role" onchange="toggleClassField()">
                    <option value="ogrenci">Öğrenci</option>
                    <option value="ogretmen">Öğretmen</option>
                    <option value="veli">Veli</option>
                </select>
            </div>

            <div class="input-group">
                <label>Profil Fotoğrafı (opsiyonel)</label>
                <div class="file-upload-wrapper" style="position:relative; display:block; width:100%;">
                  <button type="button" onclick="document.getElementById('profilePic').click()" style="width:100%; padding:10px; background:#f1f1f1; border:1px dashed #aaa; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; color:#555; position:relative;">
                     <i class="fa fa-upload"></i> <span id="fileNameDisplay">Fotoğraf Seç</span>
                  </button>
                  <input type="file" id="profilePic" accept="image/*" style="opacity:0; position:absolute; top:0; left:0; width:100%; height:100%; cursor:pointer;" onchange="document.getElementById('fileNameDisplay').textContent = this.files.length > 0 ? this.files[0].name : 'Fotoğraf Seç'">
                </div>
            </div>

            <div class="input-group" id="studentLevelGroup" style="display:none;">
                <label>Eğitim Kademesi</label>
                <select id="studentLevel" onchange="updateStudentClassOptions()">
                    <option value="ilkokul">İlkokul</option>
                    <option value="ortaokul">Ortaokul</option>
                    <option value="lise" selected>Lise</option>
                </select>
            </div>

            <div class="input-group" id="studentClassGroup" style="display:none;">
                <label>Sınıf</label>
                <select id="studentClass">
                    <option value="9">9. Sınıf</option>
                    <option value="10">10. Sınıf</option>
                    <option value="11">11. Sınıf</option>
                    <option value="12">12. Sınıf</option>
                </select>
            </div>

            <div class="input-group" id="branchGroup" style="display:none;">
                <label id="branchLabel">Şube</label>
                <select id="branchSelect">
                    <option value="A">A Şubesi</option>
                    <option value="B">B Şubesi</option>
                    <option value="C">C Şubesi</option>
                    <option value="D">D Şubesi</option>
                    <option value="E">E Şubesi</option>
                    <option value="F">F Şubesi</option>
                    <option value="G">G Şubesi</option>
                </select>
            </div>

            <button class="login-btn" type="submit">Kayıt Ol</button>
        </form>
    </div>
</div>

<script>
// Güvenlik: Input validation fonksiyonları
function validateTC(tc) {
  // TC 11 haneli, sayısal olmalı
  return /^\d{11}$/.test(tc);
}

function validatePassword(password) {
  // Min 8 char, en az 1 büyük harf, 1 küçük harf, 1 rakam gerektir
  return password.length >= 8 && 
         /[A-Z]/.test(password) && 
         /[a-z]/.test(password) && 
         /[0-9]/.test(password);
}

function validateName(name) {
  // Min 3 char, sadece harf ve boşluk
  return name.length >= 3 && /^[a-zA-ZçÇğĞıİöÖşŞüÜ\s]+$/.test(name);
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

function toggleClassField() {
    const role = document.getElementById("role").value;
    const studentGroup = document.getElementById("studentClassGroup");
    const studentLevelGroup = document.getElementById("studentLevelGroup");
    const branchGroup = document.getElementById("branchGroup");
    const branchSelect = document.getElementById("branchSelect");
    const branchLabel = document.getElementById("branchLabel");
    
    if (role === "ogrenci" || role === "ogretmen") {
        studentGroup.style.display = "block";
        studentLevelGroup.style.display = "block";
        branchGroup.style.display = "block";
        
        if (role === "ogretmen") {
            // Teacher selects multiple classes and branches
            document.getElementById("studentClass").setAttribute("multiple", "multiple");
            document.getElementById("studentClass").setAttribute("size", "4");
            branchSelect.setAttribute("multiple", "multiple");
            branchSelect.setAttribute("size", "4");
            branchLabel.textContent = "Yetkili Şubeler (Ctrl ile çoklu seçim)";
        } else {
            document.getElementById("studentClass").removeAttribute("multiple");
            document.getElementById("studentClass").removeAttribute("size");
            branchSelect.removeAttribute("multiple");
            branchSelect.removeAttribute("size");
            branchLabel.textContent = "Şube";
        }
    } else {
        studentGroup.style.display = "none";
        studentLevelGroup.style.display = "none";
        branchGroup.style.display = "none";
    }

    // Öğretmen/Veli ise telefon numarasını göster, öğrenci ise gizle
    const phoneGroup = document.getElementById("phoneGroup");
    if (role === "ogrenci") {
        phoneGroup.style.display = "none";
        document.getElementById("phone").removeAttribute("required");
    } else {
        phoneGroup.style.display = "block";
        document.getElementById("phone").setAttribute("required", "required");
    }
}

function updateStudentClassOptions() {
    const level = document.getElementById("studentLevel").value;
    const classSelect = document.getElementById("studentClass");
    classSelect.innerHTML = "";
    
    if (level === "ilkokul") {
        [1, 2, 3, 4].forEach(c => classSelect.innerHTML += `<option value="${c}">${c}. Sınıf</option>`);
    } else if (level === "ortaokul") {
        [5, 6, 7, 8].forEach(c => classSelect.innerHTML += `<option value="${c}">${c}. Sınıf</option>`);
    } else if (level === "lise") {
        [9, 10, 11, 12].forEach(c => classSelect.innerHTML += `<option value="${c}">${c}. Sınıf</option>`);
    }
}

document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let tc = document.getElementById("tc").value.trim();
    let password = document.getElementById("password").value;
    let phone = document.getElementById("phone").value.trim();
    let school = document.getElementById("school").value.trim();
    let role = document.getElementById("role").value;

    // Güvenlik: Input validation
    if(!name || !tc || !password || (role !== "ogrenci" && !phone) || !school){
        alert("Tüm alanları doldurun!");
        return;
    }

    // TC validasyonu
    if (!validateTC(tc)) {
        alert("TC Kimlik No 11 haneli ve sayısal olmalıdır!");
        return;
    }

    // Ad-soyad validasyonu
    if (!validateName(name)) {
        alert("Ad-soyad en az 3 karakter olmalı ve sadece harf içermelidir!");
        return;
    }

    // Şifre validasyonu
    if (!validatePassword(password)) {
        alert("Şifre en az 8 karakter, 1 büyük harf, 1 küçük harf ve 1 rakam içermelidir!");
        return;
    }

    // School validasyonu
    if (school.length < 3 || school.length > 100) {
        alert("Okul adı 3 ile 100 karakter arasında olmalıdır!");
        return;
    }

    let userPayload = {
        tc: tc,
        password: password,
        role: role,
        name: name,
        school: school,
        classNum: "",
        branch: ""
    };

    if (role === "ogrenci") {
        userPayload.classNum = document.getElementById("studentClass").value;
        userPayload.branch = document.getElementById("branchSelect").value;
    } else if (role === "ogretmen") {
        const clsSelected = Array.from(document.getElementById("studentClass").selectedOptions).map(opt => opt.value);
        userPayload.classNum = clsSelected.join(",");
        const brSelected = Array.from(document.getElementById("branchSelect").selectedOptions).map(opt => opt.value);
        userPayload.branch = brSelected.join(",");
    }

    fetch('http://localhost:3000/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(userPayload)
    }).then(async res => {
        const data = await res.json();
        if(data.success) {
            console.log("SQL DB Kaydı başarılı");
            fallbackToLocalStorage();
        } else {
            alert("Kayıt Hatası: " + data.message);
            // Don't fallback automatically if server actively returns error
        }
    }).catch(err => {
        console.warn("SQL Server çalışmıyor olabilir, LocalStorage kullanılıyor.", err);
        fallbackToLocalStorage();
    });

    function fallbackToLocalStorage() {
        let users = JSON.parse(localStorage.getItem("users")) || [];
        if(users.some(user => user.tc === tc)){
            alert("Bu TC zaten kayıtlı!");
            return;
        }

        let user = {
            id: Date.now().toString(),
            name: escapeHtml(name),
            tc: tc,
            password: password,
            phone: escapeHtml(phone),
            role: role,
            school: escapeHtml(school),
            createdAt: new Date().toISOString()
        };

        if (role === "ogrenci" || role === "ogretmen") {
            user.level = document.getElementById("studentLevel").value;
            if (role === "ogrenci") {
                user.class = document.getElementById("studentClass").value;
            } else {
                const selected = Array.from(document.getElementById("studentClass").selectedOptions).map(opt => opt.value);
                user.authorizedClasses = selected;
            }
        }

        const photoInput = document.getElementById('profilePic');
        if (photoInput && photoInput.files && photoInput.files[0]) {
            const file = photoInput.files[0];
            if (file.size > 2 * 1024 * 1024) { alert("Sınır 2MB"); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                user.profilePic = e.target.result;
                users.push(user);
                localStorage.setItem("users", JSON.stringify(users));
                alert("Kayıt başarılı");
                redirectFunc();
            };
            reader.readAsDataURL(file);
            return;
        }

        users.push(user);
        localStorage.setItem("users", JSON.stringify(users));
        alert("Kayıt başarılı");
        redirectFunc();
    }

    function redirectFunc() {
        if(role === "ogrenci") window.location.href = "öğrenci-login.html";
        else if(role === "ogretmen") window.location.href = "öğretmen-login.html";
        else if(role === "veli") window.location.href = "veli-login.html";
    }
});
</script>

</body>
</html>
