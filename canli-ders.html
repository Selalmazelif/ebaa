<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Canlı Dersler</title>

<style>

body{
font-family:Arial;
background:#e9eef3;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.tabs{
display:flex;
gap:30px;
margin-bottom:20px;
font-weight:bold;
}

.info{
background:#f4f4f4;
padding:15px;
border-radius:6px;
margin-bottom:20px;
}

.empty{
text-align:center;
color:#777;
padding:80px;
font-size:18px;
}

.btn{
background:#f4a43a;
border:none;
padding:10px 20px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h2>Canlı Dersler</h2>

<div class="container">

<div class="tabs">
<span>Harici Canlı Dersler</span>
<span>Canlı Dersler</span>
</div>

<div class="info">
Harici canlı ders saatleri bilgisayarınızda ayarlı olan GMT +3 Europe/Istanbul saat dilimine göre gösterilmektedir.
</div>

<button class="btn">Derslerin Durumunu Güncelle</button>

<div class="empty">
Listelenecek canlı ders bulunmamaktadır.
</div>

</div>

</body>
</html>
