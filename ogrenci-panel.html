<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Öğrenci Paneli</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f3f4f6;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#8a1550;
color:white;
height:100vh;
padding:20px;
}

.logo{
font-size:26px;
font-weight:bold;
margin-bottom:30px;
}

.profile{
text-align:center;
margin-bottom:30px;
}

.profile-box{
width:70px;
height:70px;
border-radius:50%;
background:#ccc;
margin:auto;
margin-bottom:10px;
}

/* MENU */

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:12px 10px;
border-radius:8px;
}

.sidebar li:hover{
background:#6c0e3d;
}

.sidebar a{
text-decoration:none;
color:white;
display:block;
}

.sidebar i{
margin-right:10px;
}

/* MAIN */

.main{
flex:1;
}

/* TOPBAR */

.topbar{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.search{
display:flex;
align-items:center;
background:#f1f1f1;
border-radius:25px;
padding:8px 15px;
width:300px;
}

.search input{
border:none;
background:none;
outline:none;
width:100%;
}

.icons i{
margin-left:20px;
font-size:18px;
cursor:pointer;
}

/* BANNER */

.banner{
margin:20px;
background:#ff9800;
border-radius:15px;
padding:30px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
}

.banner button{
background:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
text-align:center;
}

.card i{
font-size:30px;
color:#8a1550;
margin-bottom:10px;
}

.card a{
text-decoration:none;
color:black;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">EBA</div>

<div class="profile">
<div class="profile-box"></div>
<p>Öğrenci</p>
</div>

<ul>

<li>
<a href="ogrenci-panel.html">
<i class="fa-solid fa-house"></i> Ana Sayfa
</a>
</li>

<li>
<a href="dersler.html">
<i class="fa-solid fa-book"></i> Dersler
</a>
</li>

<li>
<a href="canli-ders.html">
<i class="fa-solid fa-video"></i> Canlı Ders
</a>
</li>

<li>
<a href="kitaplar.html">
<i class="fa-solid fa-file"></i> Kitaplar
</a>
</li>

<li>
<a href="sinavlar.html">
<i class="fa-solid fa-pen"></i> Sınavlar
</a>
</li>

</ul>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<div class="search">
<i class="fa fa-search"></i>
<input placeholder="Ara">
</div>

<div class="icons">

<i class="fa fa-bell"></i>

<a href="chat.html">
<i class="fa fa-envelope"></i>
</a>

</div>

</div>

<!-- BANNER -->

<div class="banner">

<div>
<h2>Bugün Ne Öğrenmek İstersin?</h2>
<p>Derslerine hızlıca ulaş</p>
</div>

<button><a href="dersler.html">Derslere Git</a></button>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
<a href="dersler.html">
<i class="fa-solid fa-book"></i>
<h3>Dersler</h3>
</a>
</div>

<div class="card">
<a href="canli-ders.html">
<i class="fa-solid fa-video"></i>
<h3>Canlı Ders</h3>
</a>
</div>

<div class="card">
<a href="kitaplar.html">
<i class="fa-solid fa-file"></i>
<h3>Kitaplar</h3>
</a>
</div>

<div class="card">
<a href="sinavlar.html">
<i class="fa-solid fa-pen"></i>
<h3>Sınavlar</h3>
</a>
</div>

</div>

</div>

</body>
</html>
