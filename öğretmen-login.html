<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Öğretmen Giriş</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <header>
        <div class="logo">EBA</div>
    </header>

    <div class="container">

        <div class="login-box">

            <div class="role-tab">Öğretmen</div>

            <h2>MEBBİS ile Giriş</h2>

            <div class="input-group">
                <label>Kullanıcı Adı</label>
                <input type="number">
            </div>

            <div class="input-group">
                <label>Şifre</label>
                <input type="password">
            </div>

            <div class="links">
                <a href="#">Şifremi unuttum</a>
                <a href="register.html">Öğretmen hesabı oluştur</a>
            </div>

            <button class="login-btn">Giriş</button>

    </div>
</div>

<script src="login.js"></script>
</body>

</html>
