<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Öğretmen Giriş</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <header>
        <div class="logo">EBA</div>
    </header>

    <div class="container">

        <div class="login-box">

            <div class="role-tab">Öğretmen</div>

            <h2>MEBBİS ile Giriş</h2>

            <form id="loginForm">
                <div class="input-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="tc" placeholder="Kullanıcı Adı">
                </div>

                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="Şifre">
                </div>

                <div class="links">
                    <a href="sifre-sifirla.html">Şifremi unuttum</a>
                    <a href="register.html">Öğretmen hesabı oluştur</a>
                </div>

                <button class="login-btn" type="submit">Giriş</button>
            </form>

        </div>
</div>

<script>
const loginForm = document.getElementById("loginForm");

if (localStorage.getItem("authToken") && localStorage.getItem("currentUser")) {
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));
    const token = localStorage.getItem("authToken");
    if (currentUser.role === "ogretmen" && currentUser.token === token) {
        window.location.href = "ogretmen-panel.html";
    } else {
        localStorage.removeItem("currentUser");
        localStorage.removeItem("authToken");
    }
}

if (loginForm) {
    loginForm.addEventListener("submit", function (e) {
        e.preventDefault();

        let tc = document.getElementById("tc").value.trim();
        let password = document.getElementById("password").value;

        if (!tc || !password) {
            alert("Lütfen tüm alanları doldurun.");
            return;
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];
        let user = users.find(u => u.tc === tc && u.password === password);

        if (user) {
            if (user.role !== "ogretmen") {
                let wrongRoleMsg = "❌ Siz öğretmen değilsiniz!\n\n";
                wrongRoleMsg += "Lütfen uygun giriş sayfasını kullanın:\n\n";
                if (user.role === "ogrenci") {
                    wrongRoleMsg += "👨‍🎓 Öğrenci Login: öğrenci-login.html";
                } else if (user.role === "veli") {
                    wrongRoleMsg += "👨‍👩‍👧 Veli Login: veli-login.html";
                }
                alert(wrongRoleMsg);
                return;
            }
            const token = 'token_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const secureUser = {
                ...user,
                token: token,
                loginTime: Date.now()
            };
            
            localStorage.setItem("authToken", token);
            localStorage.setItem("currentUser", JSON.stringify(secureUser));
            sessionStorage.removeItem("currentUser");
            sessionStorage.removeItem("tabId");
            
            alert("✅ Giriş başarılı!");
            window.location.href = "ogretmen-panel.html";
        } else {
            alert("❌ Kullanıcı adı veya şifre yanlış");
        }
    });
}
</script>
</body>

</html>
