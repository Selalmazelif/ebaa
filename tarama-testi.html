<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tarama Testi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="panel.css">
<style>
.question { background:white; padding:25px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,0,0,0.05); border:1px solid #eee; }
.question h3 { margin-bottom:18px; font-size:17px; color:#284B63; line-height:1.4; }
.options { display:flex; flex-direction:column; gap:12px; }
.option { padding:14px 18px; border:1px solid #ddd; border-radius:10px; cursor:pointer; transition:0.2s; background:#fafafa; display:flex; align-items:center; font-size:15px; }
.option:hover { background:#EBF5FB; border-color:#4A748F; }
.option input { margin-right:12px; width:18px; height:18px; cursor:pointer; }

/* Dark Overrides */
body.dark-mode .question { border-color: rgba(255,255,255,0.05) !important; }
body.dark-mode .question h3 { color: #a8d4f0 !important; }
body.dark-mode .option { background: rgba(0,0,0,0.2) !important; border-color: rgba(255,255,255,0.1) !important; color: #94afc5 !important; }
body.dark-mode .option:hover { background: rgba(92, 142, 173, 0.15) !important; }
</style>
<script src="auth-utils.js"></script><script>requireAuth();</script></head>

<body>

  <div class="sidebar">
    <div class="logo">EBA</div>
    <div class="profile">
      <div class="profile-img-container" onclick="document.getElementById('profilePicInput').click()" title="Fotoğrafı Değiştir">
        <div style="width:80px; height:80px; background:#fff; border-radius:50%; border:3px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; overflow:hidden; margin: 0 auto 10px;">
          <i class="fa fa-user" style="font-size:40px; color:#ccc;" id="default-avatar-icon"></i>
          <img src="" alt="Profil Fotoğrafı" id="profile-img-display" style="display:none; width:100%; height:100%; object-fit:cover;" />
        </div>
        <div class="edit-overlay"><i class="fa fa-camera"></i></div>
        <div class="status-indicator" title="Çevrimiçi (Aktif)"></div>
      </div>
      <p id="profile-name" style="font-weight:600; font-size:16px; margin-bottom:2px;"></p>
      <p id="profile-role" style="font-size:12px; opacity:0.8; margin-bottom:4px;">Öğrenci</p>
      <p id="profile-school" style="font-size:12px; opacity:0.7;">–</p>
      <input id="profilePicInput" type="file" accept="image/*" style="display:none;" />
      <button id="logoutBtn" style="margin-top:15px; padding:6px 12px; background:#fff; color:#284B63; border-radius:8px; border:none; cursor:pointer; font-weight:700; font-size:12px;">Çıkış</button>
    </div>
    <ul id="sidebar-menu">
      <li><a href="ogrenci-panel.html"><i class="fa-solid fa-house"></i> Ana Sayfa</a></li>
      <li><a href="dersler.html"><i class="fa-solid fa-book"></i> Dersler</a></li>
      <li><a href="canli-ders.html"><i class="fa-solid fa-video"></i> Canlı Ders</a></li>
      <li><a href="kitaplar.html"><i class="fa-solid fa-file"></i> Kitaplar</a></li>
      <li><a href="sinavlar.html" class="active"><i class="fa-solid fa-pen"></i> Sınavlar</a></li>
      <li><a href="kütüphane.html"><i class="fa-solid fa-building-columns"></i> Kütüphane</a></li>
    </ul>
  </div>

<div class="main">

<div class="topbar">
<div style="flex:1;"></div>
<div class="icons"><i class="fa fa-bell"></i><a href="chat.html"><i class="fa fa-envelope"></i></a></div>
</div>

<div class="banner">
<div><h2>Tarama Testi</h2><p>Lütfen tüm soruları dikkatlice okuyarak cevaplayınız.</p></div>
</div>

<div style="padding:20px;" id="test-container">
<!-- Sorular buraya gelecek -->
</div>
<div style="padding:0 20px 20px 20px;">
  <button onclick="submitTest()" style="background:#4A748F; color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:15px;">Testi Bitir</button>
</div>

</div>

<script src="auth-utils.js"></script>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-school').textContent = user.school || '';
  document.getElementById('logoutBtn').addEventListener('click', logout);
  
  if (user.profilePic) {
    document.getElementById('default-avatar-icon').style.display = 'none';
    const profileImg = document.getElementById('profile-img-display');
    profileImg.src = user.profilePic;
    profileImg.style.display = 'block';
  }

  function generateMathQuestion() {
    const num1 = Math.floor(Math.random() * 50) + 1;
    const num2 = Math.floor(Math.random() * 50) + 1;
    const operators = ['+', '-', '*'];
    const op = operators[Math.floor(Math.random() * operators.length)];
    let ans = 0;
    if (op === '+') ans = num1 + num2;
    if (op === '-') ans = num1 - num2;
    if (op === '*') ans = num1 * num2;
    
    let wrong1 = ans + Math.floor(Math.random() * 10) + 1;
    let wrong2 = ans - Math.floor(Math.random() * 10) - 1;
    let wrong3 = ans * 2;
    let wrong4 = ans + 5;
    
    const options = [ans, wrong1, wrong2, wrong3, wrong4];
    // Sadece 4 şık al ve karıştır
    const shuffledOptions = options.sort(() => 0.5 - Math.random()).slice(0, 4);
    // Doğru cevabın kaybolmadığından emin ol
    if(!shuffledOptions.includes(ans)){
        shuffledOptions[0] = ans;
        shuffledOptions.sort(() => 0.5 - Math.random());
    }
    
    return {
      q: `${num1} ${op} ${num2} işleminin sonucu kaçtır?`,
      options: shuffledOptions,
      answer: ans
    };
  }

  const testContainer = document.getElementById('test-container');
  let html = '';
  // 5 soru üret
  for(let i=1; i<=5; i++) {
    const data = generateMathQuestion();
    html += `
    <div class="question">
      <h3>Soru ${i}: ${data.q}</h3>
      <div class="options">
        ${data.options.map((opt, idx) => `
          <label class="option">
            <input type="radio" name="q${i}" value="${opt}">
            <span>${['A', 'B', 'C', 'D'][idx]}) ${opt}</span>
          </label>
        `).join('')}
      </div>
    </div>`;
  }
  testContainer.innerHTML = html;
}

function submitTest() {
  alert("Testiniz başarıyla kaydedildi! Sonuçlar öğretmeninize iletilecektir.");
  window.location.href = 'sinavlar.html';
}
</script>

</body>
</html>
