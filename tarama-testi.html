<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tarama Testi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="panel.css">
<style>
.question { background:white; padding:20px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
.question h3 { margin-bottom:15px; font-size:16px; color:#333; }
.options { display:flex; flex-direction:column; gap:10px; }
.option { padding:10px 15px; border:1px solid #ddd; border-radius:6px; cursor:pointer; transition:0.2s; background:#fafafa; display:flex; align-items:center;}
.option:hover { background:#f0d4e2; border-color:#8a1550; }
.option input { margin-right:10px; }
</style>
</head>

<body>

<div class="sidebar">

<div class="logo">EBA</div>

<div class="profile">
<div class="profile-box"></div>
<p id="profile-name">Öğrenci</p>
<button id="logoutBtn" style="margin-top:8px; padding:6px 10px; background:#fff; color:#8a1550; border:none; border-radius:8px; cursor:pointer; font-weight:700;">Çıkış</button>
</div>

<ul>
<li><a href="ogrenci-panel.html"><i class="fa-solid fa-house"></i> Ana Sayfa</a></li>
<li><a href="dersler.html"><i class="fa-solid fa-book"></i> Dersler</a></li>
<li><a href="sinavlar.html"><i class="fa-solid fa-pen"></i> Sınavlar</a></li>
</ul>

</div>

<div class="main">

<div class="topbar">
<div class="search"><i class="fa fa-search"></i><input placeholder="Ara"></div>
<div class="icons"><i class="fa fa-bell"></i><a href="chat.html"><i class="fa fa-envelope"></i></a></div>
</div>

<div class="banner">
<div><h2>Tarama Testi</h2><p>Lütfen tüm soruları dikkatlice okuyarak cevaplayınız.</p></div>
</div>

<div style="padding:20px;" id="test-container">
<!-- Sorular buraya gelecek -->
</div>
<div style="padding:0 20px 20px 20px;">
  <button onclick="submitTest()" style="background:#8a1550; color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:15px;">Testi Bitir</button>
</div>

</div>

<script src="auth-utils.js"></script>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('logoutBtn').addEventListener('click', logout);

  function generateMathQuestion() {
    const num1 = Math.floor(Math.random() * 50) + 1;
    const num2 = Math.floor(Math.random() * 50) + 1;
    const operators = ['+', '-', '*'];
    const op = operators[Math.floor(Math.random() * operators.length)];
    let ans = 0;
    if (op === '+') ans = num1 + num2;
    if (op === '-') ans = num1 - num2;
    if (op === '*') ans = num1 * num2;
    
    let wrong1 = ans + Math.floor(Math.random() * 10) + 1;
    let wrong2 = ans - Math.floor(Math.random() * 10) - 1;
    let wrong3 = ans * 2;
    let wrong4 = ans + 5;
    
    const options = [ans, wrong1, wrong2, wrong3, wrong4];
    // Sadece 4 şık al ve karıştır
    const shuffledOptions = options.sort(() => 0.5 - Math.random()).slice(0, 4);
    // Doğru cevabın kaybolmadığından emin ol
    if(!shuffledOptions.includes(ans)){
        shuffledOptions[0] = ans;
        shuffledOptions.sort(() => 0.5 - Math.random());
    }
    
    return {
      q: `${num1} ${op} ${num2} işleminin sonucu kaçtır?`,
      options: shuffledOptions,
      answer: ans
    };
  }

  const testContainer = document.getElementById('test-container');
  let html = '';
  // 5 soru üret
  for(let i=1; i<=5; i++) {
    const data = generateMathQuestion();
    html += `
    <div class="question">
      <h3>Soru ${i}: ${data.q}</h3>
      <div class="options">
        ${data.options.map((opt, idx) => `
          <label class="option">
            <input type="radio" name="q${i}" value="${opt}">
            <span>${['A', 'B', 'C', 'D'][idx]}) ${opt}</span>
          </label>
        `).join('')}
      </div>
    </div>`;
  }
  testContainer.innerHTML = html;
}

function submitTest() {
  alert("Testiniz başarıyla kaydedildi! Sonuçlar öğretmeninize iletilecektir.");
  window.location.href = 'sinavlar.html';
}
</script>

</body>
</html>
