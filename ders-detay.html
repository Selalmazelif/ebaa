<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ders Detayı</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="panel.css">
<script src="auth-utils.js"></script><script>requireAuth();</script></head>

<body>

<div class="sidebar">

<div class="logo">EBA</div>

<div class="profile">
<div class="profile-box"></div>
<p id="profile-name">Öğrenci</p>
<p id="profile-school" style="font-size:13px; color:#DDE7EC; margin-top:4px;">Okul</p>
<button id="logoutBtn" style="margin-top:8px; padding:6px 10px; background:#fff; color:#4A748F; border:none; border-radius:8px; cursor:pointer; font-weight:700;">Çıkış</button>
</div>

<ul>

<li>
<a href="ogrenci-panel.html">
<i class="fa-solid fa-house"></i> Ana Sayfa
</a>
</li>

<li>
<a href="dersler.html">
<i class="fa-solid fa-book"></i> Dersler
</a>
</li>

<li>
<a href="canli-ders.html">
<i class="fa-solid fa-video"></i> Canlı Ders
</a>
</li>

<li>
<a href="sinavlar.html">
<i class="fa-solid fa-pen"></i> Sınavlar
</a>
</li>

<li>
<a href="chat.html">
<i class="fa-solid fa-comments"></i> Mesajlar
</a>
</li>

</ul>

</div>

<div class="main">

<div class="topbar">

<div class="search">
<i class="fa fa-search"></i>
<input placeholder="Ara">
</div>

<div class="icons">

<i class="fa fa-bell"></i>

<a href="chat.html">
<i class="fa fa-envelope"></i>
</a>

</div>

</div>

<div class="banner">

<div>
<h2 id="ders-title">Ders Detayı</h2>
<p id="class-info">Sınıfınıza göre ders konuları</p>
</div>
<button onclick="window.history.back()">Geri Dön</button>

</div>

<div class="cards" id="topics-grid">

<!-- Dinamik olarak doldurulur -->

</div>

</div>

<script src="auth-utils.js"></script>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-school').textContent = user.school;
  document.getElementById('logoutBtn').addEventListener('click', logout);

  const topicsGrid = document.getElementById('topics-grid');
  const classInfo = document.getElementById('class-info');
  const dersTitle = document.getElementById('ders-title');

  const urlParams = new URLSearchParams(window.location.search);
  const selectedDers = urlParams.get('ders');

  const dersler = {
    '9': [
      { name: 'Türkçe', topics: ['Fiil Çekimleri', 'Cümle Türleri', 'Noktalama İşaretleri', 'Yazım Kuralları'] },
      { name: 'Matematik', topics: ['Mantık', 'Kümeler', 'Denklemler ve Eşitsizlikler', 'Üslü ve Köklü İfadeler'] },
      { name: 'Fen Bilimleri', topics: ['Fizik Bilimine Giriş', 'Madde ve Özellikleri', 'Kuvvet ve Hareket'] },
      { name: 'Tarih', topics: ['Tarih ve Zaman', 'İnsanlığın İlk Dönemleri', 'Orta Çağda Dünya'] },
      { name: 'İngilizce', topics: ['Studying Abroad', 'My Environment', 'Movies', 'Human In Nature'] }
    ],
    '10': [
      { name: 'Türkçe', topics: ['Edebiyata Giriş', 'Hikaye', 'Şiir', 'Destan ve Efsane', 'Roman'] },
      { name: 'Matematik', topics: ['Sayma ve Olasılık', 'Fonksiyonlar', 'Polinomlar', 'İkinci Dereceden Denklemler'] },
      { name: 'Fizik', topics: ['Elektrik ve Manyetizma', 'Basınç ve Kaldırma Kuvveti', 'Dalgalar'] },
      { name: 'Kimya', topics: ['Kimyanın Temel Kanunları', 'Karışımlar', 'Asitler, Bazlar ve Tuzlar'] },
      { name: 'Biyoloji', topics: ['Hücre Bölünmeleri', 'Kalıtım', 'Ekosistem Ekolojisi'] },
      { name: 'Tarih', topics: ['Yerleşme ve Devletleşme Süreci', 'Dünya Gücü Osmanlı', 'Sultan ve Osmanlı Merkez Teşkilatı'] }
    ],
    '11': [
      { name: 'Türkçe', topics: ['Edebiyat ve Toplum', 'Makale', 'Sohbet ve Fıkra', 'Eleştiri'] },
      { name: 'Matematik', topics: ['Trigonometri', 'Analitik Geometri', 'Fonksiyonlarda Uygulamalar', 'Çember ve Daire'] },
      { name: 'Fizik', topics: ['Kuvvet ve Hareket', 'Elektrik ve Manyetizma'] },
      { name: 'Kimya', topics: ['Modern Atom Teorisi', 'Gazlar', 'Sıvı Çözeltiler', 'Kimyasal Tepkimelerde Enerji'] },
      { name: 'Biyoloji', topics: ['İnsan Fizyolojisi', 'Komünite ve Popülasyon Ekolojisi'] },
      { name: 'Tarih', topics: ['Değişen Dünya Dengeleri', 'Değişim Çağında Avrupa', 'Uluslararası İlişkiler'] },
      { name: 'Coğrafya', topics: ['Biyoçeşitlilik', 'Şehirlerin Fonksiyonları', 'Türkiye\'de Tarım ve Hayvancılık'] }
    ],
    '12': [
      { name: 'Türkçe', topics: ['Edebiyat Felsefe İlişkisi', 'Sözcükte Anlam', 'Cümlede Anlam', 'Paragraf'] },
      { name: 'Matematik', topics: ['Üstel ve Logaritmik Fonksiyonlar', 'Diziler', 'Türev', 'İntegral'] },
      { name: 'Fizik', topics: ['Çembersel Hareket', 'Basit Harmonik Hareket', 'Atom Fiziğine Giriş'] },
      { name: 'Kimya', topics: ['Kimya ve Elektrik', 'Karbon Kimyasına Giriş', 'Organik Bileşikler'] },
      { name: 'Biyoloji', topics: ['Genden Proteine', 'Hücresel Solunum', 'Bitki Biyolojisi'] },
      { name: 'Tarih', topics: ['20. Yüzyıl Başlarında Osmanlı', 'Milli Mücadele', 'Atatürkçülük ve Türk İnkılabı'] },
      { name: 'Coğrafya', topics: ['Ekstrem Doğa Olayları', 'Küresel İklim Değişimi', 'Türkiye\'nin Ekonomik Politikaları'] },
      { name: 'Felsefe', topics: ['20. Yüzyıl Felsefesi', 'Mantık', 'Psikoloji', 'Sosyoloji'] }
    ]
  };

  const userClass = user.class || '9';
  
  if (selectedDers) {
      dersTitle.textContent = selectedDers;
      classInfo.textContent = `${userClass}. Sınıf ${selectedDers} Konuları`;
      
      const classDersler = dersler[userClass] || [];
      const dersObj = classDersler.find(d => d.name === selectedDers);
      
      if (dersObj && dersObj.topics) {
          topicsGrid.innerHTML = dersObj.topics.map((topic, index) => `
            <div class="card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
              <div style="background:#DDE7EC; color:#4A748F; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-weight:bold; margin-bottom:15px;">
                ${index + 1}
              </div>
              <h3 style="font-size:16px;">${topic}</h3>
              <button style="margin-top:15px; padding:8px 15px; border:none; background:#4A748F; color:white; border-radius:20px; cursor:pointer;">
                Konuya Git
              </button>
            </div>
          `).join('');
      } else {
          topicsGrid.innerHTML = `<p style="grid-column: 1 / -1; text-align:center; padding:20px;">Bu ders için konu bulunamadı.</p>`;
      }
  } else {
      dersTitle.textContent = "Ders Seçilmedi";
      topicsGrid.innerHTML = `<p style="grid-column: 1 / -1; text-align:center; padding:20px;">Lütfen önceki sayfadan bir ders seçin.</p>`;
  }
}
</script>

</body>
</html>
