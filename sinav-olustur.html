<script>
const user = requireAuth();
if (user && user.role === 'ogretmen') {
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-school').textContent = user.school || '';
  document.getElementById('logoutBtn').addEventListener('click', logout);
  
  if (user.profilePic) {
      document.getElementById('default-avatar-icon').style.display = 'none';
      const profileImg = document.getElementById('profile-img-display');
      profileImg.src = user.profilePic;
      profileImg.style.display = 'block';
  }

  document.getElementById('saveExamBtn').addEventListener('click', async () => {
      const title = document.getElementById('examTitle').value.trim();
      const questions = document.getElementById('examQuestions').value.trim();
      const classesStr = document.getElementById('targetClasses').value.trim();
      const subject = document.getElementById('examSubject').value.trim() || 'Genel';
      const resultEl = document.getElementById('saveResult');

      if (!title || !classesStr) {
          resultEl.style.color = '#e74c3c';
          resultEl.textContent = 'â ïļ LÃžtfen sÄąnav adÄą ve hedef sÄąnÄąflarÄą doldurun!';
          return;
      }

      const btn = document.getElementById('saveExamBtn');
      btn.disabled = true;
      btn.textContent = 'âģ Kaydediliyor...';
      resultEl.textContent = '';

      try {
        // 1) Quiz'i kaydet
        const res = await ebaFetch('/api/quizzes', {
          method: 'POST',
          body: JSON.stringify({
            teacher_tc:   user.tc,
            teacher_name: user.name,
            title,
            subject,
            target_class: classesStr,
            school:       user.school,
            time_limit:   20
          })
        });

        if (!res) {
          btn.disabled = false;
          btn.innerHTML = '<i class="fa fa-save"></i> SÄąnavÄą Kaydet ve Bildir';
          return;
        }

        const data = await res.json();

        if (!data.success) {
          resultEl.style.color = '#e74c3c';
          resultEl.textContent = 'â Hata: ' + (data.message || 'Bilinmeyen hata');
          btn.disabled = false;
          btn.innerHTML = '<i class="fa fa-save"></i> SÄąnavÄą Kaydet ve Bildir';
          return;
        }

        // 2) BaÅarÄą mesajÄą
        resultEl.style.color = '#27ae60';
        resultEl.textContent = `â "${title}" baÅarÄąyla kaydedildi! ÃÄrencilere bildirim gÃķnderildi.`;

        // Formu temizle
        document.getElementById('examTitle').value = '';
        document.getElementById('examSubject').value = '';
        document.getElementById('examQuestions').value = '';
        document.getElementById('targetClasses').value = '';

      } catch(e) {
        resultEl.style.color = '#e74c3c';
        resultEl.textContent = 'â Bir hata oluÅtu: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-save"></i> SÄąnavÄą Kaydet ve Bildir';
      }

        document.getElementById('examTitle').value = '';
        document.getElementById('examSubject').value = '';
        document.getElementById('examQuestions').value = '';
        document.getElementById('targetClasses').value = '';

      } catch(e) {
        resultEl.style.color = '#e74c3c';
        resultEl.textContent = 'â Bir hata oluÅtu: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-save"></i> SÄąnavÄą Kaydet ve Bildir';
      }
  });

} else {
    window.location.href = 'index.html';
}
</script>

<script>
function parseNotifText(originalText) {
  let txt = originalText;
  let btn = '';
  const match = txt.match(/===EXAM_DET:(.*?)===/);
  if(match) {
     const parts = match[1].split('|');
     const title = parts[0], cor = parts[1], wro = parts[2], bla = parts[3], json = parts[4] || '[]';
     const jsonEscaped = json.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
     btn = '<br><button onclick="showExamDetails(\''+title+'\',\''+cor+'\',\''+wro+'\',\''+bla+'\',\''+jsonEscaped+'\')" style="margin-top:5px;background:#4A748F;color:white;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;">HatalÄą SorularÄą GÃķr</button>';
     txt = txt.replace(match[0], '');
  }
  return txt + btn;
}

async function loadNotifs() {
  const cu = typeof currentUser !== 'undefined' ? currentUser : (JSON.parse(localStorage.getItem('currentUser') || '{}'));
  if (!cu || !cu.tc) return;
  try {
    const r = await ebaFetch('/api/notifications?tc=' + cu.tc);
    if (!r) return;
    const d = await r.json(); 
    if (!d.success) return;
    const notifs = d.notifications;
    const unread = notifs.filter(n => !n.isRead).length;
    const badge = document.getElementById('notifBadge');
    if (badge) {
      if (unread > 0) { badge.style.display = 'inline-flex'; badge.textContent = unread; }
      else badge.style.display = 'none';
    }
    const list = document.getElementById('notifList');
    if (list) {
      list.innerHTML = notifs.slice(0, 10).map(n => `
        <div style="padding:10px 16px;border-bottom:1px solid #f0f0f0;font-size:12px;line-height:1.5;${n.isRead ? 'opacity:.65;' : 'font-weight:600;'}">
          ${parseNotifText(n.text)}
          <div style="font-size:10px;color:#bbb;margin-top:2px;">${new Date(n.createdAt).toLocaleString('tr-TR')}</div>
        </div>
      `).join('') || '<div style="padding:10px 16px;color:#aaa;text-align:center;font-size:12px;">Bildirim yok</div>';
    }
  } catch (e) {}
}

async function toggleNotif() {
  const p = document.getElementById('notifPanel');
  if (!p) return;
  if (p.style.display === 'block') { p.style.display = 'none'; return; }
  p.style.display = 'block';
  const cu = typeof currentUser !== 'undefined' ? currentUser : (JSON.parse(localStorage.getItem('currentUser') || '{}'));
  if (cu && cu.tc) {
    try {
      await ebaFetch('/api/notifications/read', { method: 'PUT', body: JSON.stringify({ tc: cu.tc }) });
      const b = document.getElementById('notifBadge');
      if (b) b.style.display = 'none';
    } catch (e) {}
  }
}
document.addEventListener('click', e => {
  const p = document.getElementById('notifPanel');
  if(p && !e.target.closest('#notifPanel') && !e.target.closest('span[onclick*="toggleNotif"]')) p.style.display = 'none';
});
setTimeout(() => { loadNotifs(); }, 1000);
</script>
