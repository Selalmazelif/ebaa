<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sınav Oluştur</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="panel.css">
</head>

<body>

  <div class="sidebar">
    <div class="logo">EBA</div>
    <div class="profile">
      <div class="profile-img-container" onclick="document.getElementById('profilePicInput').click()" title="Fotoğrafı Değiştir">
        <div style="width:80px; height:80px; background:#fff; border-radius:50%; border:3px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; overflow:hidden; margin: 0 auto 10px;">
          <i class="fa fa-user" style="font-size:40px; color:#ccc;" id="default-avatar-icon"></i>
          <img src="" alt="Profil Fotoğrafı" id="profile-img-display" style="display:none; width:100%; height:100%; object-fit:cover;" />
        </div>
        <div class="edit-overlay"><i class="fa fa-camera"></i></div>
        <div class="status-indicator" title="Çevrimiçi (Aktif)"></div>
      </div>
      <p id="profile-name" style="font-weight:600; font-size:16px; margin-bottom:2px;"></p>
      <p id="profile-role" style="font-size:12px; opacity:0.8; margin-bottom:4px;">Öğretmen</p>
      <p id="profile-school" style="font-size:12px; opacity:0.7;">–</p>
      <input id="profilePicInput" type="file" accept="image/*" style="display:none;" />
      <button id="logoutBtn" style="margin-top:15px; padding:6px 12px; background:#fff; color:#284B63; border-radius:8px; border:none; cursor:pointer; font-weight:700; font-size:12px;">Çıkış</button>
    </div>
    <ul>
      <li><a href="ogretmen-panel.html"><i class="fa-solid fa-house"></i> Ana Sayfa</a></li>
      <li><a href="ogretmen-dersler.html"><i class="fa-solid fa-book"></i> Derslerim</a></li>
      <li><a href="canli-ders.html"><i class="fa-solid fa-video"></i> Canlı Ders</a></li>
      <li><a href="ogretmen-ogrenciler.html"><i class="fa-solid fa-users"></i> Öğrenciler</a></li>
      <li><a href="sinav-olustur.html" class="active"><i class="fa-solid fa-pen"></i> Sınav Oluştur</a></li>
      <li><a href="kütüphane.html"><i class="fa-solid fa-building-columns"></i> Kütüphane</a></li>
      <li><a href="chat.html"><i class="fa-solid fa-comments"></i> Mesajlar</a></li>
    </ul>
  </div>

<div class="main">

  <div class="topbar">
    <div class="search"><i class="fa fa-search"></i><input placeholder="Ara"></div>
    
    <div class="icons" style="position:relative;">
      <span style="position:relative;cursor:pointer;" onclick="toggleNotif()">
        <i class="fa fa-bell"></i>
        <span id="notifBadge" style="display:none;background:#e74c3c;color:white;border-radius:50%;width:16px;height:16px;font-size:10px;align-items:center;justify-content:center;position:absolute;top:-6px;right:-6px;display:inline-flex;"></span>
      </span>
      <a href="chat.html"><i class="fa fa-envelope"></i></a>
    </div>

    <!-- Bildirim paneli -->
    <div id="notifPanel" style="display:none;position:fixed;top:64px;right:20px;width:300px;max-height:360px;overflow-y:auto;background:white;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.15);z-index:9999;">
      <div style="padding:12px 16px;border-bottom:1px solid #eee;font-weight:700;color:#284B63;font-size:13px;">🔔 Bildirimler</div>
      <div id="notifList"></div>
    </div>
    
  </div>

  <div class="banner">
    <div>
      <h2>Sınav Oluştur</h2>
      <p>Öğrencileriniz için yeni sınavlar hazırlayın</p>
    </div>
  </div>

  <div style="padding:20px;">
    <div style="background:white; padding:30px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.05); max-width:600px;">
        <label style="display:block; margin-bottom:6px; font-weight:bold;">Sınav Adı</label>
        <input type="text" id="examTitle" placeholder="Örn: 1. Dönem 1. Yazılı" style="width:100%; padding:10px; margin-bottom:16px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">

        <label style="display:block; margin-bottom:6px; font-weight:bold;">Ders / Konu</label>
        <input type="text" id="examSubject" placeholder="Örn: Matematik, Türkçe" style="width:100%; padding:10px; margin-bottom:16px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">

        <label style="display:block; margin-bottom:6px; font-weight:bold;">Sorular / Açıklama</label>
        <textarea id="examQuestions" placeholder="Sınav hakkında açıklama veya soruları yazın..." style="width:100%; height:150px; padding:10px; margin-bottom:16px; border:1px solid #ddd; border-radius:6px; resize:vertical; box-sizing:border-box;"></textarea>

        <label style="display:block; margin-bottom:6px; font-weight:bold;">Hedef Sınıflar <span style="font-weight:normal;color:#888;">(virgülle ayırın: 9, 10, 11)</span></label>
        <input type="text" id="targetClasses" placeholder="Örn: 10" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">

        <button id="saveExamBtn" style="background:#4A748F; color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:15px;">
          <i class="fa fa-save"></i> Sınavı Kaydet ve Bildir
        </button>

        <div id="saveResult" style="margin-top:14px; font-size:13px;"></div>
    </div>
  </div>

</div>

<script src="auth-utils.js"></script>
<script>
const user = requireAuth();
if (user && user.role === 'ogretmen') {
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-school').textContent = user.school || '';
  document.getElementById('logoutBtn').addEventListener('click', logout);
  
  if (user.profilePic) {
      document.getElementById('default-avatar-icon').style.display = 'none';
      const profileImg = document.getElementById('profile-img-display');
      profileImg.src = user.profilePic;
      profileImg.style.display = 'block';
  }

  document.getElementById('saveExamBtn').addEventListener('click', async () => {
      const title = document.getElementById('examTitle').value.trim();
      const questions = document.getElementById('examQuestions').value.trim();
      const classesStr = document.getElementById('targetClasses').value.trim();
      const subject = document.getElementById('examSubject').value.trim() || 'Genel';
      const resultEl = document.getElementById('saveResult');

      if (!title || !classesStr) {
          resultEl.style.color = '#e74c3c';
          resultEl.textContent = '⚠️ Lütfen sınav adı ve hedef sınıfları doldurun!';
          return;
      }

      const btn = document.getElementById('saveExamBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Kaydediliyor...';
      resultEl.textContent = '';

      try {
        // 1) Quiz'i kaydet
        const res = await ebaFetch('/api/quizzes', {
          method: 'POST',
          body: JSON.stringify({
            teacher_tc:   user.tc,
            teacher_name: user.name,
            title,
            subject,
            target_class: classesStr,
            school:       user.school,
            time_limit:   20
          })
        });

        if (!res) {
          btn.disabled = false;
          btn.innerHTML = '<i class="fa fa-save"></i> Sınavı Kaydet ve Bildir';
          return;
        }

        const data = await res.json();

        if (!data.success) {
          resultEl.style.color = '#e74c3c';
          resultEl.textContent = '❌ Hata: ' + (data.message || 'Bilinmeyen hata');
          btn.disabled = false;
          btn.innerHTML = '<i class="fa fa-save"></i> Sınavı Kaydet ve Bildir';
          return;
        }

        // 2) Başarı mesajı
        resultEl.style.color = '#27ae60';
        resultEl.textContent = `✅ "${title}" başarıyla kaydedildi! Öğrencilere bildirim gönderildi.`;

        // Formu temizle
        document.getElementById('examTitle').value = '';
        document.getElementById('examSubject').value = '';
        document.getElementById('examQuestions').value = '';
        document.getElementById('targetClasses').value = '';

      } catch(e) {
        resultEl.style.color = '#e74c3c';
        resultEl.textContent = '❌ Bir hata oluştu: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-save"></i> Sınavı Kaydet ve Bildir';
      }

        document.getElementById('examTitle').value = '';
        document.getElementById('examSubject').value = '';
        document.getElementById('examQuestions').value = '';
        document.getElementById('targetClasses').value = '';

      } catch(e) {
        resultEl.style.color = '#e74c3c';
        resultEl.textContent = '❌ Bir hata oluştu: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-save"></i> Sınavı Kaydet ve Bildir';
      }
  });

} else {
    window.location.href = 'index.html';
}
</script>

<script>
function parseNotifText(originalText) {
  let txt = originalText;
  let btn = '';
  const match = txt.match(/===EXAM_DET:(.*?)===/);
  if(match) {
     const parts = match[1].split('|');
     const title = parts[0], cor = parts[1], wro = parts[2], bla = parts[3], json = parts[4] || '[]';
     const jsonEscaped = json.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
     btn = '<br><button onclick="showExamDetails(\''+title+'\',\''+cor+'\',\''+wro+'\',\''+bla+'\',\''+jsonEscaped+'\')" style="margin-top:5px;background:#4A748F;color:white;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;">Hatalı Soruları Gör</button>';
     txt = txt.replace(match[0], '');
  }
  return txt + btn;
}


setTimeout(() => { loadNotifs(); }, 1000);
</script>

  <script src="fix-notifications.js"></script>
  <script src="ai-bot.js"></script>
</body>
</html>
