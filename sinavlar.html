<html lang="tr">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="panel.css">
</head>

<body>

<div class="sidebar">

<div class="logo">EBA</div>

<div class="profile">
<div class="profile-box"></div>
<p id="profile-name">Öğrenci</p>
<p id="profile-school" style="font-size:13px; color:#f0d4e2; margin-top:4px;">Okul</p>
<button id="logoutBtn" style="margin-top:8px; padding:6px 10px; background:#fff; color:#8a1550; border:none; border-radius:8px; cursor:pointer; font-weight:700;">Çıkış</button>
</div>

<ul>

<li>
<a href="ogrenci-panel.html">
<i class="fa-solid fa-house"></i> Ana Sayfa
</a>
</li>

<li>
<a href="dersler.html">
<i class="fa-solid fa-book"></i> Dersler
</a>
</li>

<li>
<a href="canli-ders.html">
<i class="fa-solid fa-video"></i> Canlı Ders
</a>
</li>

<li>
<a href="sinavlar.html">
<i class="fa-solid fa-pen"></i> Sınavlar
</a>
</li>

<li>
<a href="chat.html">
<i class="fa-solid fa-comments"></i> Mesajlar
</a>
</li>

</ul>

</div>

<div class="main">

<div class="topbar">

<div class="search">
<i class="fa fa-search"></i>
<input placeholder="Ara">
</div>

<div class="icons">

<i class="fa fa-bell"></i>

<a href="chat.html">
<i class="fa fa-envelope"></i>
</a>

</div>

</div>

<div class="banner">

<div>
<h2>Sınavlar</h2>
<p id="class-info">Sınıfınıza göre sınavlar</p>
</div>

</div>

<div class="cards" id="sinavlar-grid">

<!-- Dinamik olarak doldurulur -->

</div>

</div>

<script src="auth-utils.js"></script>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-school').textContent = user.school;
  document.getElementById('logoutBtn').addEventListener('click', logout);

  const sinavlarGrid = document.getElementById('sinavlar-grid');
  const classInfo = document.getElementById('class-info');

  const sinavlar = {
    '9': [
      { name: 'Tarama Testleri', color: '#2c6aa0' },
      { name: 'Kazanım Kavrama Testleri', color: '#e33a6a' },
      { name: 'Tekrar Testleri', color: '#3f8f7f' }
    ],
    '10': [
      { name: 'Tarama Testleri', color: '#2c6aa0' },
      { name: 'Kazanım Kavrama Testleri', color: '#e33a6a' },
      { name: 'Tekrar Testleri', color: '#3f8f7f' },
      { name: 'Ara Sınav', color: '#ff9800' }
    ],
    '11': [
      { name: 'Tarama Testleri', color: '#2c6aa0' },
      { name: 'Kazanım Kavrama Testleri', color: '#e33a6a' },
      { name: 'Tekrar Testleri', color: '#3f8f7f' },
      { name: 'Ara Sınav', color: '#ff9800' },
      { name: 'YKS Hazırlık', color: '#9c27b0' }
    ],
    '12': [
      { name: 'Tarama Testleri', color: '#2c6aa0' },
      { name: 'Kazanım Kavrama Testleri', color: '#e33a6a' },
      { name: 'Tekrar Testleri', color: '#3f8f7f' },
      { name: 'Ara Sınav', color: '#ff9800' },
      { name: 'YKS Hazırlık', color: '#9c27b0' },
      { name: 'TYT Denemeleri', color: '#4caf50' }
    ]
  };

  const userClass = user.class || '9';
  classInfo.textContent = `${userClass}. Sınıf Sınavları`;

  const classSinavlar = sinavlar[userClass] || [];
  sinavlarGrid.innerHTML = classSinavlar.map(sinav => `
    <div class="card" style="background: ${sinav.color};">
      <h3>${sinav.name}</h3>
    </div>
  `).join('');
}
</script>

</body>
</html>
