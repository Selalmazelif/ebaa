<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sınavlar</title>

<style>

body{
font-family:Arial;
background:#eef2f5;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.card{
color:white;
padding:40px;
border-radius:8px;
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
}

.tarama{
background:#2c6aa0;
}

.kazanim{
background:#e33a6a;
}

.tekrar{
background:#3f8f7f;
}

</style>
</head>

<body>

<div class="grid">

<div class="card tarama">
Tarama Testleri
</div>

<div class="card kazanim">
Kazanım Kavrama Testleri
</div>

<div class="card tekrar">
Tekrar Testleri
</div>

</div>

</body>
</html>
