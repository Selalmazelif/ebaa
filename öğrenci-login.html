<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Öğrenci Giriş</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <header>
        <div class="logo">EBA</div>
    </header>

    <div class="container">

        <div class="login-box">

            <div class="role-tab">Öğrenci</div>

            <h2>EBA Hesabı ile Giriş Yap</h2>

            <form id="loginForm">
                <div class="input-group">
                    <label>TC Kimlik No</label>
                    <input type="number" id="tc" placeholder="11 haneli TC">
                </div>

                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="Şifre">
                </div>

                <div class="links">
                    <a href="sifre-sifirla.html">Şifremi unuttum</a>
                    <a href="register.html">EBA hesabı oluştur</a>
                    <a href="sifre-sifirla.html">EBA şifresi al</a>
                </div>

                <button class="login-btn" type="submit">Giriş</button>
            </form>

        </div>
    </div>

<script>
const loginForm = document.getElementById("loginForm");

if (localStorage.getItem("authToken") && localStorage.getItem("currentUser")) {
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));
    const token = localStorage.getItem("authToken");
    if (currentUser.role === "ogrenci" && currentUser.token === token) {
        window.location.href = "ogrenci-panel.html";
    } else {
        localStorage.removeItem("currentUser");
        localStorage.removeItem("authToken");
    }
}

if (loginForm) {
    loginForm.addEventListener("submit", function (e) {
        e.preventDefault();

        let tc = document.getElementById("tc").value.trim();
        let password = document.getElementById("password").value;

        if (!tc || !password) {
            alert("Lütfen tüm alanları doldurun.");
            return;
        }

        // 1. API (SQL) Denemesi
        fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tc, password, role: 'ogrenci' })
        })
        .then(async res => {
            const data = await res.json();
            if (data.success) {
                console.log("✅ SQL Login Başarılı");
                handleLoginSuccess(data.user, data.token);
            } else {
                // Şifre yanlışsa veya kullanıcı yoksa yerel depoda dene
                fallbackToLocalStorage(tc, password);
            }
        })
        .catch(err => {
            console.warn("⚠️ SQL Server bağlantı hatası, Yerel Depo (LocalStorage) kullanılıyor.");
            fallbackToLocalStorage(tc, password);
        });

        function fallbackToLocalStorage(tc, password) {
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(u => u.tc === tc && u.password === password);

            if (user) {
                if (user.role !== "ogrenci") {
                    alert("❌ Siz öğrenci değilsiniz! Lütfen uygun giriş sayfasını kullanın.");
                    return;
                }
                const token = 'token_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                handleLoginSuccess(user, token);
            } else {
                alert("❌ Hatalı giriş bilgileri!");
            }
        }

        function handleLoginSuccess(user, token) {
            const secureUser = {
                ...user,
                token: token,
                loginTime: Date.now()
            };
            localStorage.setItem("authToken", token);
            localStorage.setItem("currentUser", JSON.stringify(secureUser));
            alert("✅ Giriş başarılı!");
            window.location.href = "ogrenci-panel.html";
        }
    });
}
</script>
</body>

</html>
