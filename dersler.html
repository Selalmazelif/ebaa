<div>

</div>

</div>

<div class="cards" id="dersler-grid">

<!-- Dinamik olarak doldurulur -->

</div>

</div>

<script src="auth-utils.js"></script>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-school').textContent = user.school;
  document.getElementById('logoutBtn').addEventListener('click', logout);

  const derslerGrid = document.getElementById('dersler-grid');
  const classInfo = document.getElementById('class-info');

  const dersler = {
    '9': [
      { name: 'Türkçe', img: 'img/foto1.jpg', topics: ['Fiil Çekimleri', 'Cümle Türleri', 'Noktalama İşaretleri'] },
      { name: 'Matematik', img: 'img/foto2.jpeg', topics: ['Üslü Sayılar', 'Köklü Sayılar', 'Faktöriyel'] },
      { name: 'Fen Bilimleri', img: 'img/foto3.jpeg', topics: ['Canlılar Dünyası', 'Maddenin Halleri'] },
      { name: 'Tarih', img: 'img/foto4.jpeg', topics: ['İlk Çağ Uygarlıkları', 'Türklerin Tarih Sahnesi'] },
      { name: 'İngilizce', img: 'img/foto1.jpg', topics: ['Simple Present', 'Kelime Bilgisi'] }
    ],
    '10': [
      { name: 'Türkçe', img: 'img/foto1.jpg', topics: ['Edebi Sanatlar', 'Paragraf Anlamı'] },
      { name: 'Matematik', img: 'img/foto2.jpeg', topics: ['Doğrusal Denklemler', 'Polinomlar'] },
      { name: 'Fizik', img: 'img/foto3.jpeg', topics: ['Elektrik', 'Kuvvet'] },
      { name: 'Kimya', img: 'img/foto4.jpeg', topics: ['Atom Modelleri', 'Elementler'] },
      { name: 'Biyoloji', img: 'img/foto1.jpg', topics: ['Hücre ve Organizasyon', 'Ekosistem'] },
      { name: 'Tarih', img: 'img/foto2.jpeg', topics: ['Osmanlıda Dağılma Dönemi', 'Kurtuluş Savaşı'] }
    ],
    '11': [
      { name: 'Türkçe', img: 'img/foto1.jpg', topics: ['Anlatım Bozuklukları', 'Paragraf Türleri'] },
      { name: 'Matematik', img: 'img/foto2.jpeg', topics: ['Denklem Sistemleri', 'Olasılık'] },
      { name: 'Fizik', img: 'img/foto3.jpeg', topics: ['Dalga', 'Optik'] },
      { name: 'Kimya', img: 'img/foto4.jpeg', topics: ['Kimyasal Enerji', 'Organik Kimya'] },
      { name: 'Biyoloji', img: 'img/foto1.jpg', topics: ['Genetik', 'Fizyoloji'] },
      { name: 'Tarih', img: 'img/foto2.jpeg', topics: ['Çağdaş Türk ve Dünya Tarihi'] },
      { name: 'Coğrafya', img: 'img/foto3.jpeg', topics: ['Küresel Isınma', 'Nüfus Coğrafyası'] }
    ],
    '12': [
      { name: 'Türkçe', img: 'img/foto1.jpg', topics: ['Sözcük Türleri', 'Anlatım Teknikleri'] },
      { name: 'Matematik', img: 'img/foto2.jpeg', topics: ['Türev', 'Limit', 'Permütasyon'] },
      { name: 'Fizik', img: 'img/foto3.jpeg', topics: ['Elektrik-Magnetizma', 'Modern Fizik'] },
      { name: 'Kimya', img: 'img/foto4.jpeg', topics: ['Asit-Baz', 'Kimyasal Denklem'] },
      { name: 'Biyoloji', img: 'img/foto1.jpg', topics: ['Evrim', 'Bitki Fizyolojisi'] },
      { name: 'Tarih', img: 'img/foto2.jpeg', topics: ['Dünya Siyaseti', 'Soğuk Savaş'] },
      { name: 'Coğrafya', img: 'img/foto3.jpeg', topics: ['Doğal Kaynaklar', 'Nüfus Politikaları'] },
      { name: 'Felsefe', img: 'img/foto4.jpeg', topics: ['Etik', 'Siyaset Felsefesi'] }
    ]
  };

  const userClass = user.class || '9';
  classInfo.textContent = `${userClass}. Sınıf Dersleri`;

  const classDersler = dersler[userClass] || [];
  derslerGrid.innerHTML = classDersler.map(ders => {
    const topicList = ders.topics ? ders.topics.map(topic => `<li>${topic}</li>`).join('') : '';
    return `
      <div class="card">
        <img src="${ders.img}" alt="${ders.name}">
        <h3>${ders.name}</h3>
        ${topicList ? `<ul style="text-align:left; font-size:0.85rem; padding-left:16px; color:#333;">${topicList}</ul>` : ''}
      </div>
    `;
  }).join('');
}
</script>

</body>
</html>
