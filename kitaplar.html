<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>Kitaplar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="panel.css">

</head>

<body>

  <div class="sidebar">

    <div class="logo">EBA</div>

    <div class="profile">
      <div class="profile-img-container" onclick="document.getElementById('profilePicInput').click()"
        title="Fotoğrafı Değiştir">
        <div
          style="width:80px; height:80px; background:#fff; border-radius:50%; border:3px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; overflow:hidden; margin: 0 auto 10px;">
          <i class="fa fa-user" style="font-size:40px; color:#ccc;" id="default-avatar-icon"></i>
          <img src="" alt="Profil Fotoğrafı" id="profile-img-display"
            style="display:none; width:100%; height:100%; object-fit:cover;" />
        </div>
        <div class="edit-overlay">
          <i class="fa fa-camera"></i>
        </div>
        <div class="status-indicator" title="Çevrimiçi (Aktif)"></div>
      </div>
      <p id="profile-name" style="font-weight:600; font-size:16px; margin-bottom:2px;"></p>
      <p id="profile-role" style="font-size:12px; opacity:0.8; margin-bottom:4px;">Rol: Öğrenci</p>
      <p id="profile-school" style="font-size:12px; opacity:0.7;">–</p>
      <input id="profilePicInput" type="file" accept="image/*" style="display:none;" />
      <button id="logoutBtn"
        style="margin-top:15px; padding:6px 12px; background:#fff; color:#284B63; border-radius:8px; border:none; cursor:pointer; font-weight:700; font-size:12px;">Çıkış</button>
    </div>

    <ul id="sidebar-menu">
      <li><a href="ogrenci-panel.html" class="active"><i class="fa-solid fa-house"></i> Ana Sayfa</a></li>
      <li><a href="dersler.html"><i class="fa-solid fa-book"></i> Dersler</a></li>
      <li><a href="canli-ders.html"><i class="fa-solid fa-video"></i> Canlı Ders</a></li>
      <li><a href="kitaplar.html"><i class="fa-solid fa-file"></i> Kitaplar</a></li>
      <li><a href="sinavlar.html"><i class="fa-solid fa-pen"></i> Sınavlar</a></li>
      <li><a href="kütüphane.html"><i class="fa-solid fa-building-columns"></i> Kütüphane</a></li>
    </ul>

  </div>

  <div class="main">
    <div class="topbar">
      <div></div>
      <div class="icons">
        <i class="fa fa-bell" title="Bildirimler"></i>
        <a href="chat.html"><i class="fa fa-envelope" title="Mesajlar"></i></a>
      </div>
    </div>

    <div class="banner">
      <div>
        <h2>Kitaplar</h2>
        <p>Önerilen ve okumanız gereken kitaplar</p>
      </div>
    </div>

    <div class="cards" id="kitaplar-grid">
      <!-- JS ile doldurulacak -->
    </div>
  </div>

  <script src="auth-utils.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-school').textContent = user.school;
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) logoutBtn.addEventListener('click', logout);

      if (user.profilePic) {
        document.getElementById('default-avatar-icon').style.display = 'none';
        const profileImg = document.getElementById('profile-img-display');
        profileImg.src = user.profilePic;
        profileImg.style.display = 'block';
      }

      const menu = document.getElementById('sidebar-menu');
      menu.innerHTML = `
    <li><a href="${redirectByRole(user.role)}"><i class="fa-solid fa-house"></i> Ana Sayfa</a></li>
    <li><a href="dersler.html"><i class="fa-solid fa-book"></i> Dersler</a></li>
    <li><a href="canli-ders.html"><i class="fa-solid fa-video"></i> Canlı Ders</a></li>
    <li><a href="kitaplar.html" class="active"><i class="fa-solid fa-file"></i> Kitaplar</a></li>
    <li><a href="sinavlar.html"><i class="fa-solid fa-pen"></i> Sınavlar</a></li>
    <li><a href="kütüphane.html"><i class="fa-solid fa-building-columns"></i> Kütüphane</a></li>
    <li><a href="ayarlar.html"><i class="fa-solid fa-gear"></i> Ayarlar</a></li>
  `;

      async function readBook(title) {
        alert(title + ' kitabını okumaya başladınız!');
        try {
          await fetch('/api/student-stats', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ student_tc: user.tc, type: 'content' })
          });
        } catch (e) { }
      }

      const kitaplar = [
        { title: "Sefiller", author: "Victor Hugo", img: "https://m.media-amazon.com/images/I/51rY8Z+8T1L._SY344_BO1,204,203,200_.jpg", type: "Roman" },
        { title: "Suç ve Ceza", author: "Dostoyevski", img: "https://m.media-amazon.com/images/I/41Z-mndfVzL._SY344_BO1,204,203,200_.jpg", type: "Roman" },
        { title: "1984", author: "George Orwell", img: "https://m.media-amazon.com/images/I/41aM4xOZxaL._SY344_BO1,204,203,200_.jpg", type: "Bilim Kurgu" },
        { title: "Simyacı", author: "Paulo Coelho", img: "https://m.media-amazon.com/images/I/51y1Ww1yC0L._SY344_BO1,204,203,200_.jpg", type: "Fantastik" },
        { title: "Nutuk", author: "Mustafa Kemal Atatürk", img: "https://m.media-amazon.com/images/I/41O+nQkI9TL._SY344_BO1,204,203,200_.jpg", type: "Tarih" },
        { title: "Küçük Prens", author: "Antoine de Saint-Exupéry", img: "https://m.media-amazon.com/images/I/41SgR7-oO3L._SY344_BO1,204,203,200_.jpg", type: "Hikaye" },
      ];

      const grid = document.getElementById('kitaplar-grid');
      grid.innerHTML = kitaplar.map(kitap => `
    <div class="card" style="display:flex; flex-direction:column; justify-content:space-between; cursor:pointer;" onclick="readBook('${kitap.title}')">
      <div>
        <div style="background:#eee; height:150px; border-radius:8px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
            ${kitap.img ?`<img src="${kitap.img}" style="width:100%; height:100%; object-fit:cover; margin:0; border-radius:0;">` : `<i class="fa fa-book" style="font-size:40px; color:#aaa; margin:0;"></i>`}
        </div>
        <h3 style="font-size:16px; margin-bottom:5px;">${kitap.title}</h3>
        <p style="font-size:13px; color:#666;">${kitap.author}</p>
      </div>
      <div style="margin-top:15px; display:inline-block; padding:4px 10px; background:#DDE7EC; color:#4A748F; font-size:11px; font-weight:bold; border-radius:12px; align-self:flex-start;">
        ${kitap.type}
      </div>
    </div>`).join('');

      document.getElementById('logoutBtn').addEventListener('click', logout);
    }
  </script>

 " Sınav Yanlışları Modalı"
  <div id="examDetailModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10000; align-items:center; justify-content:center;">
    <div style="background:white; width:450px; max-width:90%; border-radius:12px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
      <h3 style="margin-top:0; color:#284B63; border-bottom:1px solid #eee; padding-bottom:10px;">Sınav Detayı: <span id="examTitleSpan"></span></h3>
      <div style="display:flex; justify-content:space-around; margin-bottom:15px; text-align:center;">
         <div style="color:#2ecc71; font-weight:bold; font-size:18px;"><span id="exCor">0</span><br><span style="font-size:12px; font-weight:normal;">Doğru</span></div>
         <div style="color:#e74c3c; font-weight:bold; font-size:18px;"><span id="exWro">0</span><br><span style="font-size:12px; font-weight:normal;">Yanlış</span></div>
         <div style="color:#f39200; font-weight:bold; font-size:18px;"><span id="exBla">0</span><br><span style="font-size:12px; font-weight:normal;">Boş</span></div>
      </div>
      <div id="wrongQuestionsList" style="max-height:200px; overflow-y:auto; font-size:13px; color:#444;"></div>
      <div style="text-align:right; margin-top:20px;">
        <button onclick="document.getElementById('examDetailModal').style.display='none'" style="padding:8px 16px; background:#4A748F; color:white; border:none; border-radius:6px; cursor:pointer;">Kapat</button>
      </div>
    </div>
  </div>


<script>
function showExamDetails(t,c,w,b,sJson) {
  document.getElementById('examTitleSpan').textContent=t;
  document.getElementById('exCor').textContent=c;
  document.getElementById('exWro').textContent=w;
  document.getElementById('exBla').textContent=b;
  const el = document.getElementById('wrongQuestionsList');
  if(!sJson || sJson==='[]' || sJson==='null') {
    el.innerHTML='<div style="text-align:center;color:#aaa;padding:10px;">Yanlış soru detayı yok.</div>';
  } else {
    try {
      const arr = JSON.parse(sJson);
      el.innerHTML = arr.map(q => '<div style="border:1px solid #ffcccc;background:#fff5f5;padding:10px;border-radius:6px;margin-top:10px;"><b>Soru:</b> '+q.q+'<br><span style="color:#e74c3c">Cevabınız: '+(q.ans||'Boş')+'</span><br><span style="color:#2ecc71">Doğru: '+q.corr+'</span></div>').join('');
    } catch(e){ el.innerHTML='Hata: '+e.message; }
  }
  document.getElementById('examDetailModal').style.display='flex';
}

function parseNotifText(originalText) {
  let txt = originalText;
  let btn = '';
  const match = txt.match(/===EXAM_DET:(.*?)===/);
  if(match) {
     const parts = match[1].split('|');
     const title = parts[0];
     const cor = parts[1];
     const wro = parts[2];
     const bla = parts[3];
     const json = parts[4] || '[]';
     const jsonEscaped = json.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
     btn = '<br><button onclick="showExamDetails(\''+title+'\',\''+cor+'\',\''+wro+'\',\''+bla+'\',\''+jsonEscaped+'\')" style="margin-top:5px;background:#4A748F;color:white;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;">Hatalı Soruları Gör</button>';
     txt = txt.replace(match[0], '');
  }
  return txt + btn;
}


setTimeout(() => { loadNotifs(); }, 1000);
</script>


  <script src="fix-notifications.js"></script>
  <script src="ai-bot.js"></script>
</body>

</html>
