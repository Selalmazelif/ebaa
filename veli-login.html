<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Veli Giriş</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <header>
        <div class="logo">EBA</div>
    </header>

    <div class="container">

        <div class="login-box">

            <div class="role-tab">Veli</div>

            <h2>Veli Hesabı ile Giriş</h2>

            <div class="input-group">
                <label>TC Kimlik No</label>
                <input type="number">
            </div>

            <div class="input-group">
                <label>Şifre</label>
                <input type="password">
            </div>

            <div class="links">
                <a href="#">Şifremi unuttum</a>
                <a href="#">Veli hesabı oluştur</a>
            </div>

            <button class="login-btn">Giriş</button>

        </div>
    </div>

</body>

</html>
