<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Veli Giriş</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <header>
        <div class="logo">EBA</div>
    </header>

    <div class="container">

        <div class="login-box">

            <div class="role-tab">Veli</div>

            <h2>Veli Hesabı ile Giriş</h2>

            <form id="loginForm">
                <div class="input-group">
                    <label>TC Kimlik No</label>
                    <input type="number" id="tc" placeholder="11 haneli TC">
                </div>

                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="Şifre">
                </div>

                <div class="links">
                    <a href="sifre-sifirla.html">Şifremi unuttum</a>
                    <a href="veli-register.html">Veli hesabı oluştur</a>
                </div>

                <button class="login-btn" type="submit">Giriş</button>
            </form>

        </div>
    </div>

<script>
const loginForm = document.getElementById("loginForm");

if (localStorage.getItem("authToken") && localStorage.getItem("currentUser")) {
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));
    const token = localStorage.getItem("authToken");
    if (currentUser.role === "veli" && currentUser.token === token) {
        window.location.href = "veli-panel.html";
    } else {
        localStorage.removeItem("currentUser");
        localStorage.removeItem("authToken");
    }
}

    loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        let tc = document.getElementById("tc").value.trim();
        let password = document.getElementById("password").value;

        if (!tc || !password) {
            alert("Lütfen tüm alanları doldurun.");
            return;
        }

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tc, password, role: 'veli' })
            });
            const data = await res.json();
            
            if (data.success) {
                const secureUser = {
                    ...data.user,
                    token: data.token,
                    loginTime: Date.now()
                };
                localStorage.setItem("authToken", data.token);
                localStorage.setItem("currentUser", JSON.stringify(secureUser));
                alert("✅ Giriş başarılı!");
                window.location.href = "veli-panel.html";
            } else {
                alert("❌ " + (data.message || "Hatalı giriş bilgileri!"));
            }
        } catch (err) {
            console.error("❌ Giriş hatası:", err);
            alert("❌ Sunucuya bağlanılamadı.");
        }
    });
</script>

  <script src="fix-notifications.js"></script>
  <script src="ai-bot.js"></script>
</body>

</html>
